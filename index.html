<!DOCTYPE html>
<html lang="en">

<head>
     <meta charset="UTF-8">
     <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <title>To-Do List</title>
     <link rel="stylesheet" href="style.css">
     <link rel="preconnect" href="https://fonts.googleapis.com">
     <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
     <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Raleway:ital,wght@0,100..900;1,100..900&family=Space+Grotesk:wght@300..700&display=swap"
          rel="stylesheet">
</head>

<body>
     <div class="todo-app">
          <h2>To-Do List <img src="./images/icon.png" alt=""></h2>
          <form class="row" id = "searchform" action = "" style = "padding: 1.5% 2.5%;">
               <input type="text" id="input-search" placeholder="Sarch Your Tasks">
          </form>
          <div class="row">
               <input type="text" id="input-add" placeholder="Enter your text">
               <button id="add">Add</button>
          </div>
          <ul id="list-container"></ul>
     </div>
     <script src="./app.js"></script>
</body>

</html>
